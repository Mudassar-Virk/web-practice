<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Password Strength Meter</title>
</head>
<body>
  <h2>Password Strength Meter</h2>
  <input id="password" type="password" placeholder="Enter password" />
  <div style="width:300px;height:20px;border:1px solid #000;margin-top:10px;">
    <div id="bar" style="height:100%;width:0%;background:red;"></div>
  </div>
  <p id="status">Weak</p>

  <script>
    const input = document.getElementById("password");
    const bar = document.getElementById("bar");
    const statusText = document.getElementById("status");

    input.addEventListener("input", function () {
      const v = this.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[a-z]/.test(v)) score++;
      if (/\d/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;

      if (score <= 2) {
        bar.style.width = "25%";
        bar.style.background = "red";
        statusText.textContent = "Weak";
      } else if (score === 3) {
        bar.style.width = "50%";
        bar.style.background = "orange";
        statusText.textContent = "Fair";
      } else if (score === 4) {
        bar.style.width = "75%";
        bar.style.background = "yellow";
        statusText.textContent = "Good";
      } else {
        bar.style.width = "100%";
        bar.style.background = "green";
        statusText.textContent = "Strong";
      }
    });
  </script>
</body>
</html>
